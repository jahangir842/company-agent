<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope | Professional Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        body { background: var(--bg-gradient); height: 100vh; font-family: 'Inter', sans-serif; }
        
        .main-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            height: 85vh;
            margin-top: 5vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #fafafa;
        }

        .msg {
            max-width: 75%;
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .user-msg {
            background: var(--primary-color);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .agent-msg {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .tool-indicator {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        .custom-input {
            border-radius: 30px;
            padding: 12px 25px;
            border: 2px solid #f0f0f0;
            transition: all 0.3s;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }

        .send-btn {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }

        /* Thinking Animation */
        .dot-flashing {
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: var(--primary-color);
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        @keyframes dot-flashing {
            0% { background-color: var(--primary-color); }
            50%, 100% { background-color: #ebe6ff; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="chat-header">
            <div>
                <h5 class="mb-0 fw-bold"><i class="bi bi-robot me-2"></i>Hiring Intelligence</h5>
                <small class="text-muted">AgentScope v1.0.19 • vLLM Engine</small>
            </div>
            <div class="d-flex gap-2">
                <span class="badge rounded-pill bg-light text-dark border"><i class="bi bi-database me-1"></i> CSV Active</span>
                <span class="badge rounded-pill bg-primary"><i class="bi bi-calculator me-1"></i> Salary Tool</span>
            </div>
        </div>

        <div class="chat-box d-flex flex-column" id="chatBox">
            <div class="msg agent-msg">
                <strong>System Initialized.</strong><br>
                I have loaded the candidate pool and the <code>calculate_monthly_salary</code> tool. How can I assist with your recruitment analytics?
            </div>
        </div>

        <div id="thinking" class="p-3 bg-light border-top d-none">
            <div class="d-flex align-items-center gap-3">
                <div class="dot-flashing"></div>
                <small class="text-muted fw-italic">Agent is reasoning & using tools...</small>
            </div>
        </div>

        <div class="input-container">
            <div class="d-flex align-items-center">
                <input type="text" id="userInput" class="form-control custom-input" placeholder="e.g., Who is the best Python dev and what is their monthly pay?" onkeypress="handleKey(event)">
                <button class="btn btn-primary send-btn" onclick="sendQuery()" id="sendBtn">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    async function sendQuery() {
        const input = document.getElementById('userInput');
        const query = input.value.trim();
        if (!query) return;

        appendMessage('user-msg', query);
        input.value = '';
        document.getElementById('thinking').classList.remove('d-none');

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            
            if (data.response) {
                appendMessage('agent-msg', data.response);
            } else {
                appendMessage('agent-msg', "Error: " + (data.error || "Unknown error"));
            }
        } catch (err) {
            appendMessage('agent-msg', "Failed to connect to AgentScope backend.");
        } finally {
            document.getElementById('thinking').classList.add('d-none');
        }
    }

    function appendMessage(className, text) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        
        // Simple Markdown-ish line break handling
        div.innerHTML = text.replace(/\n/g, '<br>');
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(e) { if (e.key === 'Enter') sendQuery(); }
</script>

</body>
</html>
